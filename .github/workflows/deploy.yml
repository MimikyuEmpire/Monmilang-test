name: 部署至 GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码  
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: 缓存依赖项
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 缓存 Quartz 插件
        uses: actions/cache@v5
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-quartz-plugins-${{ hashFiles('**/plugins/**') }}
          restore-keys: |
            ${{ runner.os }}-plugins-

      - name: 安装依赖
        run: npm ci

      - name: 安装 Quartz 插件
        run: npx quartz plugin install

      - name: 构建 Quartz
        run: npx quartz build

      - name: 上传构建结果
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: public
          node-version: 24

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
